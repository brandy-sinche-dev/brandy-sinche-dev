name: Update README

on:
  # Borramos el 'schedule' para que no se ejecute solo
  workflow_dispatch: # Ahora solo se activará si tú le das al botón manual o si otro proceso lo llama

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update README
        run: |
          echo "" >> README.md

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: "github-actions[bot]" # Se identifica como bot
          author_email: "41898282+github-actions[bot]@users.noreply.github.com"
          message: "update readme"
          add: README.md
